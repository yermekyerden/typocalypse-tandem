name: frontend-ci

on:
  workflow_dispatch:
  pull_request:
    branches: [develop, main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
      - ".nvmrc"
  push:
    branches: [develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
      - ".nvmrc"

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
